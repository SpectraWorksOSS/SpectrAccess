name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build backend
        run: python -m pip install build
      - name: Build sdist and wheel
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/spectraccess
    permissions:
      # Required for PyPI trusted publishing (OIDC). No API token/secret
      # is stored in this repo: PyPI exchanges this token for a short-lived
      # upload credential based on the pending publisher registered at
      # https://pypi.org/manage/account/publishing/ (org, repo, workflow
      # filename, and environment name below must match exactly).
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
